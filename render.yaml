# render.yaml — Deploy backend to Render.com (free tier)
services:
  - type: web
    name: mern-auth-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # Set this manually in Render dashboard
      - key: DB_NAME
        value: mern_auth_db
      - key: JWT_ACCESS_SECRET
        generateValue: true  # Render auto-generates a secure secret
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CLIENT_URL
        sync: false          # Your Vercel frontend URL
